<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Edit Form</title>
</head>

<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h4 style="color:rgb(15, 6, 100); text-align:center; font-weight:900;">
                Edit Student Data
            </h4>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text"name="name"value="{{ data.name }}"class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input type="number"name="age"value="{{ data.age }}"class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text"name="address"value="{{ data.address }}"class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"name="email"value="{{ data.email }}"class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contact</label>
                    <input type="text"name="contact"value="{{ data.contact }}"class="form-control">
                </div>

                <button type="submit" class="btn btn-success"
                onclick="return confirm('Edit is successful')">
                    Update
                </button>

                <a href="{% url 'home' %}" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
