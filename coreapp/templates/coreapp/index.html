<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali BS & English AD Sync Calendar</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #fff; }
        .dob-label { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .calendar-wrapper { display: flex; gap: 16px; }
        .calendar-field { position: relative; }
        .input-box { font-size: 16px; padding: 10px 16px; border-radius: 12px; width: 260px; outline: none; cursor: pointer; box-sizing: border-box; }
        .bs-input-style { border: 2px solid #a3c7ff; background: #eef5ff; }
        .ad-input-style { border: 1px solid #cbd5e1; background: #fff; }
        .calendar-dropdown { display: none; position: absolute; top: 48px; left: 0; background: #fff; border: 1px solid #cbd5e1; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 14px; z-index: 100; width: 260px; box-sizing: border-box; }
        .calendar-dropdown.active { display: block; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: bold; font-size: 14px; }
        .calendar-header select { padding: 2px 4px; border-radius: 4px; border: 1px solid #cbd5e1; }
        .calendar-header button { background: none; border: none; cursor: pointer; font-size: 16px; color: #2563eb; font-weight: bold; }
        .weekdays, .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .weekdays { font-size: 11px; font-weight: bold; color: #64748b; margin-bottom: 8px; }
        .day-cell { padding: 6px 0; font-size: 13px; cursor: pointer; border-radius: 6px; color: #334155; }
        .day-cell:hover { background: #f1f5f9; }
        .day-cell.empty { cursor: default; background: none!important; }
        .day-cell.selected { background: #2563eb!important; color: #fff!important; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dob-label">DOB</div>
    <div class="calendar-wrapper">
        <div class="calendar-field">
            <input type="text" id="bs-input" class="input-box bs-input-style" readonly>
            <div id="bs-calendar-box" class="calendar-dropdown">
                <div class="calendar-header">
                    <button onclick="changeMonth('bs', -1)">&lt;</button>
                    <div><select id="bs-month-select"></select><select id="bs-year-select"></select></div>
                    <button onclick="changeMonth('bs', 1)">&gt;</button>
                </div>
                <div class="weekdays"><div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div></div>
                <div id="bs-days-container" class="days-grid"></div>
            </div>
        </div>
        
        <div class="calendar-field">
            <input type="text" id="ad-input" class="input-box ad-input-style" readonly>
            <div id="ad-calendar-box" class="calendar-dropdown">
                <div class="calendar-header">
                    <button onclick="changeMonth('ad', -1)">&lt;</button>
                    <div><select id="ad-month-select"></select><select id="ad-year-select"></select></div>
                    <button onclick="changeMonth('ad', 1)">&gt;</button>
                </div>
                <div class="weekdays"><div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div></div>
                <div id="ad-days-container" class="days-grid"></div>
            </div>
        </div>
    </div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Set the global start boundary
    const START_BS = 2070;
    const END_BS = 2085;

    const bsData = {
        2070: { days: [31,31,32,32,31,30,30,29,30,29,30,30], startAD: new Date(2013, 3, 14) },
        2071: { days: [31,32,31,32,31,30,30,30,29,29,30,30], startAD: new Date(2014, 3, 14) },
        2072: { days: [31,32,32,31,31,31,29,30,30,29,30,30], startAD: new Date(2015, 3, 14) },
        2073: { days: [31,32,31,32,31,31,30,29,30,29,30,30], startAD: new Date(2016, 3, 13) },
        2074: { days: [31,32,31,32,31,31,30,30,29,30,29,30], startAD: new Date(2017, 3, 14) },
        2075: { days: [31,31,32,32,31,31,30,29,30,30,29,30], startAD: new Date(2018, 3, 14) },
        2076: { days: [31,32,31,32,32,30,30,30,29,30,29,30], startAD: new Date(2019, 3, 14) },
        2077: { days: [31,32,31,32,31,31,30,29,30,30,30,29], startAD: new Date(2020, 3, 13) },
        2078: { days: [31,32,31,32,31,31,30,30,29,30,29,30], startAD: new Date(2021, 3, 14) },
        2079: { days: [31,31,32,32,31,31,30,29,30,30,30,29], startAD: new Date(2022, 3, 14) },
        2080: { days: [31,32,31,32,31,30,30,30,29,30,30,30], startAD: new Date(2023, 3, 14) },
        2081: { days: [31,32,31,32,31,31,30,29,30,30,29,30], startAD: new Date(2024, 3, 13) },
        2082: { days: [31,31,32,32,31,30,30,30,29,30,30,30], startAD: new Date(2025, 3, 14) },
        2083: { days: [31,31,32,31,31,31,30,29,30,30,30,30], startAD: new Date(2026, 3, 14) },
        2084: { days: [31,32,31,32,31,30,30,30,30,29,30,30], startAD: new Date(2027, 3, 14) },
        2085: { days: [31,32,31,32,31,31,29,30,30,30,29,30], startAD: new Date(2028, 3, 13) }
    };

    const bsMonths = ["Baisakh","Jestha","Asar","Shrawan","Bhadra","Ashwin","Kartik","Mangsir","Poush","Magh","Falgun","Chaitra"];
    const adMonths = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    let currentBS = { year: 2083, month: 1, day: 25 };
    let currentAD = { year: 2026, month: 5, day: 8 };
    let viewBS = { ...currentBS }, viewAD = { ...currentAD };

    function syncDates(fromBS) {

        if (fromBS) {
            let yearObj = bsData[currentBS.year];
            let daysAccumulated = 0;

            for (let m = 0; m < currentBS.month; m++) {
                daysAccumulated += yearObj.days[m];
            }

            daysAccumulated += (currentBS.day - 1);

            let targetDate = new Date(yearObj.startAD);
            targetDate.setDate(targetDate.getDate() + daysAccumulated);

            currentAD = {
                year: targetDate.getFullYear(),
                month: targetDate.getMonth(),
                day: targetDate.getDate()
            };

        } else {

            let targetAD = new Date(currentAD.year, currentAD.month, currentAD.day);
            let foundYear = START_BS;

            for (let y in bsData) {
                let nextY = parseInt(y) + 1;
                let nextStart = bsData[nextY] ? bsData[nextY].startAD : new Date(2030, 3, 13);

                if (targetAD >= bsData[y].startAD && targetAD < nextStart) {
                    foundYear = parseInt(y);
                    break;
                }
            }

            let yearObj = bsData[foundYear];
            let diff = Math.floor((targetAD - yearObj.startAD) / 86400000);

            let m = 0;
            while (diff >= yearObj.days[m]) {
                diff -= yearObj.days[m];
                m++;
            }

            currentBS = { year: foundYear, month: m, day: diff + 1 };
        }

        viewBS = { ...currentBS };
        viewAD = { ...currentAD };

        document.getElementById("bs-date").value =
            `${currentBS.year}-${String(currentBS.month + 1).padStart(2,'0')}-${String(currentBS.day).padStart(2,'0')}`;

        document.getElementById("ad-date").value =
            `${currentAD.year}-${String(currentAD.month + 1).padStart(2,'0')}-${String(currentAD.day).padStart(2,'0')}`;
    }

    // SIMPLE BS → AD conversion (your old logic kept)
    document.getElementById("bs-date").addEventListener("input", function () {
        const parts = this.value.split("-");

        if (parts.length !== 3) return;

        let bsYear = parseInt(parts[0]);
        let bsMonth = parseInt(parts[1]);
        let bsDay = parseInt(parts[2]);

        if (isNaN(bsYear) || isNaN(bsMonth) || isNaN(bsDay)) return;

        let adYear = bsYear - 56;
        let adMonth = bsMonth - 8;
        let adDay = bsDay;

        if (adMonth <= 0) {
            adYear--;
            adMonth += 12;
        }

        let date = new Date(adYear, adMonth - 1, adDay);

        if (!isNaN(date)) {
            document.getElementById("ad-date").value =
                `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }
    });

    syncDates(true);
});
</script>
